<link rel="stylesheet" src="{{ '/assets/css/bootstrap.min.css' | absolute_url }}" charset="utf-8">
<style>
    .xterm {
        position: relative;
        user-select: none;
        -ms-user-select: none;
        -webkit-user-select: none;
    }

    .xterm.focus,
    .xterm:focus {
        outline: none;
    }

    .xterm .xterm-helpers {
        position: absolute;
        top: 0;
        /**
     * The z-index of the helpers must be higher than the canvases in order for
     * IMEs to appear on top.
     */
        z-index: 5;
    }

    .xterm .xterm-helper-textarea {
        padding: 0;
        border: 0;
        margin: 0;
        /* Move textarea out of the screen to the far left, so that the cursor is not visible */
        position: absolute;
        opacity: 0;
        left: -9999em;
        top: 0;
        width: 0;
        height: 0;
        z-index: -5;
        /** Prevent wrapping so the IME appears against the textarea at the correct position */
        white-space: nowrap;
        overflow: hidden;
        resize: none;
    }

    .xterm .composition-view {
        /* TODO: Composition position got messed up somewhere */
        background: #000;
        color: #FFF;
        display: none;
        position: absolute;
        white-space: nowrap;
        z-index: 1;
    }

    .xterm .composition-view.active {
        display: block;
    }

    .xterm .xterm-viewport {
        /* On OS X this is required in order for the scroll bar to appear fully opaque */
        background-color: #000;
        overflow-y: scroll;
        cursor: default;
        position: absolute;
        right: 0;
        left: 0;
        top: 0;
        bottom: 0;
    }

    .xterm .xterm-screen {
        position: relative;
    }

    .xterm .xterm-screen canvas {
        position: absolute;
        left: 0;
        top: 0;
    }

    .xterm .xterm-scroll-area {
        visibility: hidden;
    }

    .xterm-char-measure-element {
        display: inline-block;
        visibility: hidden;
        position: absolute;
        top: 0;
        left: -9999em;
        line-height: normal;
    }

    .xterm {
        cursor: text;
    }

    .xterm.enable-mouse-events {
        /* When mouse events are enabled (eg. tmux), revert to the standard pointer cursor */
        cursor: default;
    }

    .xterm.xterm-cursor-pointer,
    .xterm .xterm-cursor-pointer {
        cursor: pointer;
    }

    .xterm.column-select.focus {
        /* Column selection mode */
        cursor: crosshair;
    }

    .xterm .xterm-accessibility,
    .xterm .xterm-message {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        right: 0;
        z-index: 10;
        color: transparent;
    }

    .xterm .live-region {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
    }

    .xterm-dim {
        opacity: 0.5;
    }

    .xterm-underline {
        text-decoration: underline;
    }

    .xterm-strikethrough {
        text-decoration: line-through;
    }

    .xterm-screen .xterm-decoration-container .xterm-decoration {
        z-index: 6;
        position: absolute;
    }
</style>
<div id="safariErr" style="display:none">
    <p align="center" style="color:red">This tool is not supported on Safari browser!</p>
</div>
<div class="container" id="main">
    <hr />
    <div id="program">
        <h3> Program </h3>
        <label for="baudrates" id="lblBaudrate">Baudrate:</label>
        <label style="display:none" id="lblConnTo">Connected to device: </label>
        <select name="baudrates" id="baudrates">
            <option value="921600">921600</option>
            <option value="460800">460800</option>
            <option value="230400">230400</option>
            <option value="115200">115200</option>
        </select>

        <input class="btn btn-info btn-sm" type="button" id="connectButton" value="Connect" />
        <input class="btn btn-warning btn-sm" type="button" id="disconnectButton" value="Disconnect" />
        <input class="btn btn-danger btn-sm" type="button" id="eraseButton" value="Erase Flash" />
        <br>

        <div class="alert alert-danger alert-dismissible" id="alertDiv" style="display:none; margin-top:10px">
            <a href="#" class="close" aria-label="close" onclick="$('.alert').hide()">&times;</a>
            <span id="alertmsg"></span>
        </div>

        <div id="files">
            <table class="table table-striped" id="fileTable">
                <thead class="thead-light">
                    <tr>
                        <th>Flash Address</th>
                        <th>Selected File</th>
                        <th>Remove </th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="row0">
                        <td><input type="text" id="offset1" name="offset1" value="0x1000"></td>
                        <td><input type="file" id="selectFile1" name="selected_file1"></td>
                        <td><button class="btn disabled"> Remove </button></td>
                    </tr>
                </tbody>
            </table>
            <input class="btn btn-info btn-sm" type="button" id="addFile" value="Add File" />
            <input class="btn btn-info btn-sm" type="button" id="programButton" value="Program" />
        </div>
        <output id="list"></output>
        <hr />
    </div>
    <div id="console">
        <h3>Console </h3>
        <label style="display:none" id="lblConsoleFor">Connected to device: </label>

        <input class="btn btn-info" type="button" id="consoleStartButton" value="Start" />
        <input class="btn btn-info" type="button" id="consoleStopButton" value="Stop" />
        <input class="btn btn-info" type="button" id="resetButton" value="Reset" />
        <hr />
    </div>
    <div id="terminal"></div>
</div>
<script type="text/javascript" src="{{ '/assets/javascripts/bundle.js' | absolute_url }}" charset="utf-8"></script>
<script>
    // Safari 3.0+ "[object HTMLElementConstructor]"
    var isSafari = /constructor/i.test(window.HTMLElement) || (function (p) { return p.toString() === "[object SafariRemoteNotification]"; })(!window['safari'] || (typeof safari !== 'undefined' && window['safari'].pushNotification));

    if (isSafari) {
        document.getElementById("safariErr").style.display = "inline";
        document.getElementById("main").style.display = "none";
    }
</script>
